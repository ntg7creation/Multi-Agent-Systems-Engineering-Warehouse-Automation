<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Warehouse Template Viewer</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 24px;
        background: #f7f7f7;
        color: #222;
      }

      h1 {
        margin-bottom: 8px;
      }

      .layout {
        display: flex;
        gap: 24px;
        align-items: flex-start;
        flex-wrap: wrap;
      }

      .panel {
        background: white;
        border: 1px solid #ddd;
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
      }

      #grid {
        display: grid;
        gap: 4px;
      }

      .cell {
        width: 56px;
        height: 56px;
        border-radius: 8px;
        border: 1px solid #ccc;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        font-size: 12px;
        font-weight: bold;
      }

      .road { background: #ffffff; }
      .blocked { background: #444; color: white; }
      .pickup { background: #d9f2ff; }
      .dropoff { background: #dff7d9; }

      .agent {
        position: absolute;
        bottom: 4px;
        right: 4px;
        background: #1f6feb;
        color: white;
        border-radius: 999px;
        padding: 2px 6px;
        font-size: 11px;
      }

      .item {
        position: absolute;
        top: 4px;
        left: 4px;
        background: #f59e0b;
        color: white;
        border-radius: 999px;
        padding: 2px 6px;
        font-size: 11px;
      }

      .legend {
        display: grid;
        gap: 8px;
      }

      .legend-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .swatch {
        width: 20px;
        height: 20px;
        border-radius: 4px;
        border: 1px solid #ccc;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        max-width: 480px;
      }
    </style>
  </head>
  <body>
    <h1>Warehouse Automation Template</h1>
    <p>
      This viewer is intentionally simple. Later, you can replace it with a Three.js frontend
      that uses the same state shape from <code>/api/state</code> and the websocket <code>state</code> event.
    </p>

    <div class="layout">
      <div class="panel">
        <div><strong>Turn:</strong> <span id="turn">0</span></div>
        <div id="grid"></div>
      </div>

      <div class="panel">
        <div class="legend">
          <div class="legend-row"><span class="swatch road"></span> Road</div>
          <div class="legend-row"><span class="swatch blocked"></span> Blocked / shelf</div>
          <div class="legend-row"><span class="swatch pickup"></span> Pickup location</div>
          <div class="legend-row"><span class="swatch dropoff"></span> Dropoff location</div>
        </div>
        <hr />
        <h3>Latest state JSON</h3>
        <pre id="rawState"></pre>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
